<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ভেন্ডর রেজিস্ট্রেশন | পাহাড়ি হাট</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .vendor-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .vendor-card {
            background: white;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .vendor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #2d6a4f, #e76f51, #f4a261);
        }
        
        .vendor-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .vendor-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(45,106,79,0.3);
        }
        
        .vendor-icon i {
            font-size: 2.5rem;
            color: white;
        }
        
        .vendor-header h2 {
            color: #2d6a4f;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .vendor-header p {
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d2d2d;
            font-size: 0.85rem;
        }
        
        .form-group label i {
            color: #2d6a4f;
            width: 20px;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 1rem;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-group textarea {
            padding: 12px 15px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2d6a4f;
            background: white;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
        }
        
        .btn-vendor {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn-vendor:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45,106,79,0.3);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #adb5bd;
            font-size: 0.75rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link p {
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .login-link a {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .login-link a:hover {
            color: #e76f51;
        }
        
        .home-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .home-link a {
            color: #adb5bd;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .home-link a:hover {
            color: #2d6a4f;
        }
        
        .terms {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #adb5bd;
        }
        
        .terms a {
            color: #2d6a4f;
            text-decoration: none;
        }
        
        @media (max-width: 550px) {
            .vendor-card {
                padding: 25px 20px;
            }
            
            .vendor-header h2 {
                font-size: 1.5rem;
            }
            
            .vendor-icon {
                width: 60px;
                height: 60px;
            }
            
            .vendor-icon i {
                font-size: 1.8rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
        
        /* আনুমানিক দাম শো করার স্টাইল */
        .info-note {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #2d6a4f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-note i {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="vendor-container">
    <div class="vendor-card">
        <div class="vendor-header">
            <div class="vendor-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>ভেন্ডর রেজিস্ট্রেশন</h2>
            <p>পাহাড়ি হাট-এ পণ্য বিক্রি করুন</p>
        </div>
        
        <div class="info-note">
            <i class="fas fa-info-circle"></i>
            <span>আপনার পণ্যের আনুমানিক দাম দিয়ে দিন। পরে আসল দাম আপডেট করতে পারবেন।</span>
        </div>
        
        <form id="vendorRegisterForm">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-store"></i> দোকানের নাম *</label>
                    <div class="input-group">
                        <i class="fas fa-shop"></i>
                        <input type="text" id="shopName" placeholder="যেমন: বান্দরবান মধু ঘর" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user-tie"></i> মালিকের নাম *</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="ownerName" placeholder="আপনার নাম" required>
                    </div>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> মোবাইল নম্বর *</label>
                    <div class="input-group">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="tel" id="mobile" placeholder="০১XXXXXXXXX" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> ইমেইল</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="ইমেইল ঠিকানা">
                    </div>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> জেলা *</label>
                    <div class="input-group">
                        <i class="fas fa-location-dot"></i>
                        <select id="district" required>
                            <option value="">জেলা নির্বাচন করুন</option>
                            <option value="bandarban">🏔️ বান্দরবান</option>
                            <option value="rangamati">💧 রাঙ্গামাটি</option>
                            <option value="khagrachari">🌳 খাগড়াছড়ি</option>
                            <option value="dhaka">🏙️ ঢাকা</option>
                            <option value="chittagong">🌊 চট্টগ্রাম</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> পণ্যের ধরন *</label>
                    <div class="input-group">
                        <i class="fas fa-box"></i>
                        <select id="productType" required>
                            <option value="">নির্বাচন করুন</option>
                            <option value="honey">🍯 মধু</option>
                            <option value="fruits">🍎 ফল</option>
                            <option value="meat">🍗 মাংস</option>
                            <option value="spices">🌶️ মশলা</option>
                            <option value="seafood">🐟 মাছ</option>
                            <option value="vegetables">🥬 শাক-সবজি</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-comment"></i> পণ্যের বিবরণ</label>
                <textarea id="productDescription" rows="2" placeholder="আপনার পণ্য সম্পর্কে বিস্তারিত জানান..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> পাসওয়ার্ড *</label>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> পাসওয়ার্ড নিশ্চিত করুন *</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="পাসওয়ার্ড আবার দিন" required>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-vendor">
                <i class="fas fa-user-plus"></i> ভেন্ডর হিসেবে রেজিস্ট্রেশন করুন
            </button>
        </form>
        
        <div class="divider">
            <span>ইতিমধ্যে একটি অ্যাকাউন্ট আছে?</span>
        </div>
        
        <div class="login-link">
            <p><i class="fas fa-sign-in-alt"></i> <a href="vendor-login.html">লগইন করুন</a></p>
        </div>
        
        <div class="home-link">
            <a href="../index.html">
                <i class="fas fa-home"></i> হোমপেজে ফিরুন
            </a>
        </div>
        
        <div class="terms">
            <p>রেজিস্ট্রেশন করে আপনি আমাদের <a href="#">শর্তাবলী</a> ও <a href="#">গোপনীয়তা নীতি</a> মানতে সম্মত হচ্ছেন।</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('vendorRegisterForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const shopName = document.getElementById('shopName').value;
        const ownerName = document.getElementById('ownerName').value;
        const mobile = document.getElementById('mobile').value;
        const district = document.getElementById('district').value;
        const productType = document.getElementById('productType').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        
        if (!shopName || !ownerName || !mobile || !district || !productType || !password) {
            alert('⚠️ সব তথ্য পূরণ করুন!');
            return;
        }
        
        if (password !== confirm) {
            alert('❌ পাসওয়ার্ড মিলছে না!');
            return;
        }
        
        if (mobile.length !== 11) {
            alert('📱 সঠিক মোবাইল নম্বর দিন (01XXXXXXXXX)');
            return;
        }
        
        let vendors = JSON.parse(localStorage.getItem('vendors') || '[]');
        
        if (vendors.find(v => v.mobile === mobile)) {
            alert('⚠️ এই মোবাইল নম্বর ইতিমধ্যে রেজিস্ট্রেশন করা আছে!\nলগইন করুন অথবা ভিন্ন নম্বর ব্যবহার করুন।');
            return;
        }
        
        const vendorData = {
            id: 'VND-' + Date.now(),
            shopName: shopName,
            ownerName: ownerName,
            mobile: mobile,
            email: document.getElementById('email').value,
            district: district,
            productType: productType,
            productDescription: document.getElementById('productDescription').value,
            password: password,
            status: 'approved',
            joinDate: new Date().toISOString()
        };
        
        vendors.push(vendorData);
        localStorage.setItem('vendors', JSON.stringify(vendors));
        localStorage.setItem('currentVendor', JSON.stringify(vendorData));
        
        alert(`✅ রেজিস্ট্রেশন সফল!\n\nস্বাগতম ${shopName}!\nআপনার ড্যাশবোর্ডে নিয়ে যাচ্ছি...`);
        window.location.href = 'vendor-dashboard.html';
    });
</script>
</body>
</html>
