<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>অ্যাডমিন লগইন | পাহাড়ি হাট</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #0d2b1e 0%, #1b4332 50%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* ডেকোরেটিভ এলিমেন্ট */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .admin-container {
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.6s ease;
            z-index: 10;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .admin-card {
            background: white;
            border-radius: 28px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .admin-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #2d6a4f, #e76f51, #f4a261, #2d6a4f);
            background-size: 200% 100%;
            animation: gradientMove 3s ease infinite;
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .admin-icon {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(45,106,79,0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(45,106,79,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(45,106,79,0); }
            100% { box-shadow: 0 0 0 0 rgba(45,106,79,0); }
        }
        
        .admin-icon i {
            font-size: 2.8rem;
            color: white;
        }
        
        .admin-header h1 {
            font-size: 1.8rem;
            color: #2d6a4f;
            margin-bottom: 5px;
        }
        
        .admin-header p {
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d2d2d;
            font-size: 0.85rem;
        }
        
        .form-group label i {
            color: #2d6a4f;
            width: 22px;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 48px;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #2d6a4f;
            background: white;
            box-shadow: 0 0 0 4px rgba(45,106,79,0.1);
        }
        
        .input-group input:focus + i {
            color: #2d6a4f;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45,106,79,0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .admin-footer {
            margin-top: 25px;
            text-align: center;
        }
        
        .admin-footer a {
            color: #2d6a4f;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }
        
        .admin-footer a:hover {
            color: #e76f51;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0 15px;
            color: #adb5bd;
            font-size: 0.7rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .demo-credentials {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }
        
        .demo-credentials p {
            font-size: 0.75rem;
            color: #6c757d;
            margin-bottom: 8px;
        }
        
        .demo-credentials code {
            background: #2d6a4f;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 0 5px;
        }
        
        /* নোটিফিকেশন */
        .notification-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2d6a4f;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* রেস্পন্সিভ */
        @media (max-width: 480px) {
            .admin-card {
                padding: 30px 25px;
            }
            
            .admin-header h1 {
                font-size: 1.5rem;
            }
            
            .admin-icon {
                width: 65px;
                height: 65px;
            }
            
            .admin-icon i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-card">
        <div class="admin-header">
            <div class="admin-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>অ্যাডমিন প্যানেল</h1>
            <p>পাহাড়ি হাট ম্যানেজমেন্ট সিস্টেমে স্বাগতম</p>
        </div>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> ইউজারনেম</label>
                <div class="input-group">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="username" placeholder="আপনার ইউজারনেম দিন" required autocomplete="off">
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
                </div>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> লগইন করুন
            </button>
        </form>
        
        <div class="divider">
            <span>সিকিউর অ্যাক্সেস</span>
        </div>
        
        <div class="admin-footer">
            <a href="../index.html">
                <i class="fas fa-home"></i> হোমপেজে ফিরুন
            </a>
        </div>
        
        <div class="demo-credentials">
            <p><i class="fas fa-info-circle"></i> ডেমো লগইন তথ্য</p>
            <p>ইউজারনেম: <code>admin</code> | পাসওয়ার্ড: <code>admin123</code></p>
        </div>
    </div>
</div>

<script>
    // ডিফল্ট অ্যাডমিন অ্যাকাউন্ট (প্রথমবার তৈরি হবে)
    function initializeAdminAccount() {
        let admin = localStorage.getItem('admin_account');
        if (!admin) {
            const defaultAdmin = {
                id: 'ADMIN-001',
                username: 'admin',
                password: 'admin123',
                name: 'সুপার অ্যাডমিন',
                email: 'admin@paharihat.com',
                role: 'super_admin',
                createdAt: new Date().toISOString()
            };
            localStorage.setItem('admin_account', JSON.stringify(defaultAdmin));
            console.log('ডিফল্ট অ্যাডমিন অ্যাকাউন্ট তৈরি করা হয়েছে');
        }
    }
    
    // নোটিফিকেশন দেখানোর ফাংশন
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = 'notification-toast';
        notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    // লগইন ফর্ম সাবমিট
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
            showNotification('ইউজারনেম ও পাসওয়ার্ড দিন!', 'error');
            return;
        }
        
        // অ্যাডমিন অ্যাকাউন্ট চেক
        const adminAccount = JSON.parse(localStorage.getItem('admin_account'));
        
        if (adminAccount && adminAccount.username === username && adminAccount.password === password) {
            // লগইন সফল
            localStorage.setItem('currentAdmin', JSON.stringify({
                id: adminAccount.id,
                username: adminAccount.username,
                name: adminAccount.name,
                email: adminAccount.email,
                role: adminAccount.role,
                loginTime: new Date().toISOString()
            }));
            
            showNotification(`স্বাগতম ${adminAccount.name}! ড্যাশবোর্ডে নিয়ে যাচ্ছি...`, 'success');
            
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 1000);
        } else {
            showNotification('ভুল ইউজারনেম বা পাসওয়ার্ড!', 'error');
        }
    });
    
    // পেজ লোড হলে ডিফল্ট অ্যাডমিন চেক
    initializeAdminAccount();
    
    // এন্টার কী তে সাবমিট
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
        }
    });
</script>
</body>
</html>
